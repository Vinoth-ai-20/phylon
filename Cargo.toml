[workspace]
resolver = "2"
members = [
    "crates/*"
]

[workspace.dependencies]
common = { path = "crates/common" }
phylon_config = { path = "crates/config" }
events = { path = "crates/events" }
scheduler = { path = "crates/scheduler" }
world = { path = "crates/world" }
spatial = { path = "crates/spatial" }
physics = { path = "crates/physics" }
rendering = { path = "crates/rendering" }
gpu = { path = "crates/gpu" }
diffusion = { path = "crates/diffusion" }
environment = { path = "crates/environment" }
wgpu = "22.1"
winit = "0.30"
egui = "0.28"
egui-wgpu = "0.28"
egui_plot = "0.28"
plotters = "0.3"
hecs = "0.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
ron = "0.8"
config = "0.14"
rand = "0.8"
rand_chacha = "0.3"
rayon = "1.10"
rustc-hash = "1.1"
crossbeam = "0.8"
tokio = { version = "1.39", features = ["full"] }
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio-rustls"] }
glam = "0.28"
burn = "0.14"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
puffin = "0.19"
puffin_egui = "0.28"
criterion = "0.5"
thiserror = "1.0"
anyhow = "1.0"
rhai = "1.19"
kira = "0.9"
cpal = "0.15"
tokio-tungstenite = "0.23"
quinn = "0.11"
pollster = "0.3"
bytemuck = { version = "1.18", features = ["derive"] }
noise = "0.9"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
debug = false
panic = "abort"

[profile.dev]
opt-level = 1
debug = true

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: Build · Clippy · Test · Doc
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Install software GPU drivers (Mesa lavapipe/llvmpipe) for headless wgpu tests
        # `ubuntu-latest` GitHub-hosted runners have no real GPU, and prior to
        # this step nothing installed a software Vulkan/GL fallback either —
        # `wgpu::Instance::request_adapter` returns `None` on a bare runner,
        # which panics any test that creates a real headless GPU device
        # (e.g. `gpu::diffusion_pipeline`'s tests, which deliberately exercise
        # a real wgpu device/dispatch/readback rather than mocking one — see
        # that module's own test doc comments). This was previously an
        # undocumented, unpinned assumption; installing Mesa's software
        # Vulkan driver (lavapipe) and software GL driver (llvmpipe)
        # explicitly here makes headless GPU tests reproducible instead of
        # depending on whatever happened to be preinstalled on the runner
        # image.
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers libgl1-mesa-dri libglx-mesa0 libegl1 vulkan-tools

      - name: Determinism guardrail — no unseeded RNG in simulation crates
        # Every stochastic decision must derive from the single seeded
        # `common::SimRng` resource (see its doc comment), never a fresh
        # `rand::thread_rng()` or `rand::random()` — those bypass the
        # experiment seed and silently break run-to-run reproducibility.
        # This mirrors the audit finding that caused Epic 1 of the
        # implementation roadmap; keep it red if the pattern reappears.
        run: |
          MATCHES=$(grep -rnE "rand::thread_rng\(\)|rand::random(::<|\()" crates/ --include='*.rs' | grep -vE ':[[:space:]]*//' || true)
          if [ -n "$MATCHES" ]; then
            echo "$MATCHES"
            echo "::error::Found rand::thread_rng()/rand::random() above — draw from the seeded common::SimRng resource instead."
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test --all

      - name: Doc (no deps, deny warnings)
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"
